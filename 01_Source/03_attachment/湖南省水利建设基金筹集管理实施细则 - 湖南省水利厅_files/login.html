<script type="text/javascript" src="./jquery-3.2.1.min.js.下载"></script>
<script type="text/javascript">
    // var server_url = "http://192.168.1.145:8080";
    var server_url = "https://home.hunan.gov.cn:8096";
    // var protocolStr = document.location.protocol;
    var token = localStorage.getItem("token");

    // console.log("token", token);

    var deptIdV2021111803 = getParam(location.href, 'deptId');

    var textColor = getParam(location.href, 'textColor');
    // console.log($('.top-login a'));
    if (textColor) {
        $('.top-login span').css('color', textColor);
        $('.top-login a').css('color', textColor);
        $('.top-login label').css('color', textColor);
    }

    /**
     *
     * @param href
     * @param param
     * @returns {string}
     */
    function getParam(href, param, defaultValue) {
        var reg = new RegExp("[^\?&]?" + encodeURI(param) + "=[^&]+");
        var arr = href.match(reg);
        if (arr != null) {
            return decodeURI(arr[0].substring(arr[0].search("=") + 1));
        }
        return defaultValue ? defaultValue : '';
    }

    if (localStorage.getItem("token")) {
        checkLogin();
    }

    var logname = document.getElementById("logname_a");

    //校验用户登录
    function checkLogin() {
        $.ajax({
            url: server_url + "/account-center/a/sys/app/interface/introspect",
            type: "POST",
            data: [],
            dataType: "JSON",
            beforeSend: function (xhr) {
                xhr.setRequestHeader("token", localStorage.getItem("token"));
            },
            success: function (result) {
                // console.log(result);
                if (result.active == true) {
                    getUserInfo();
                } else {
                    handleLoginData();
                }
            },
            error: function (e) {
                handleLoginData();
                console.log("用户校验登录失败...");
            }
        });
    }

    //获取用户信息
    function getUserInfo() {
        $.ajax({
            url: server_url + "/account-center/a/sys/sysMember/getMember",
            type: "POST",
            data: [],
            dataType: "JSON",
            beforeSend: function (xhr) {
                xhr.setRequestHeader("token", localStorage.getItem("token"));
            },
            success: function (result) {
                //console.log(result.data);
                //console.log(result.data.nickName);
                //console.log(result.data.id);
                localStorage.setItem("ids", result.data.id);
                localStorage.setItem("name", result.data.nickName);
                localStorage.setItem("sfz", result.data.idNo);
                localStorage.setItem("idNo", result.data.mobile);
                handleLoginData(result.data);
            },
            error: function (e) {
                handleLoginData();
                console.log("获取用户信息失败...");
            }
        });
    }

    //登录事件
    function login() {
        var s = server_url + "/account-center/a/login" + '?deptId=' + deptIdV2021111803;
        window.open(s);

                            handleLoginData();

                            window.open(s);

                    },

                        window.open(s);
                        handleLoginData();
                        // console.log("用户校验登录失败...");
                    }
                });
        */
    }

    function handleLoginData(result) {
        if (result) {
            //用户Id
            var userId = localStorage.getItem("ids");
            //用户姓名
            var username = localStorage.getItem("name");
            //用户身份证
            var cardId = localStorage.getItem("sfz");
            //用户电话号码
            var idNo = localStorage.getItem("idNo");

            //已登录
            //传值给父页面
            window.parent.postMessage(username, "*");
            window.parent.postMessage(cardId, "*");
            window.parent.postMessage(idNo, "*");
            window.parent.postMessage(userId, "*");
            window.parent.postMessage(token, "*");
            //console.log("userId : " + userId);
            if (username.length > 4) {
                //console.log("截取前的username : " + username);
                logname.setAttribute("title", username);
                username = username.substring(0, 4) + "...";
                //console.log("截取后的username : " + username);
            }
            //console.log("已登录... 用户名 : "  + username);
            document.getElementById("belog_span").style.display = "none";
            document.getElementById("loged_span").style.display = "block";
            document.getElementById("logname_a").innerText = username;
        } else {
            //未登录
            window.localStorage.clear();
            window.parent.postMessage(token, "*");
            console.log("未登录...");
            document.getElementById("logname_a").style.display = "block";
            document.getElementById("loged_span").style.display = "none";
        }
    }
</script>
